<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>封禁信息 - 苍白立方</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- Settings Drawer (same as homepage) -->
  <aside id="settingsDrawer" class="drawer" aria-hidden="true">
    <div class="drawer__header">
      <div class="drawer__title">设置</div>
      <button id="closeDrawerBtn" class="iconBtn" aria-label="关闭设置">✕</button>
    </div>

    <div class="drawer__content">
      <div class="settingRow">
        <div class="settingRow__label">主题</div>
        <div class="segmented" role="group" aria-label="主题切换">
          <button class="segmented__btn" data-theme="light" aria-pressed="false">浅色</button>
          <button class="segmented__btn" data-theme="dark" aria-pressed="false">深色</button>
        </div>
      </div>

      <div class="settingRow">
        <div class="settingRow__label">页面宽度</div>
        <div class="segmented" role="group" aria-label="页面宽度">
          <button class="segmented__btn" data-width="normal" aria-pressed="false">标准</button>
          <button class="segmented__btn" data-width="wide" aria-pressed="false">宽屏</button>
        </div>
      </div>

      <div class="hintBox">
        <div class="hintBox__title">提示</div>
        <div class="hintBox__text">
          默认会跟随系统深浅色（如果你没有手动选择主题）。封禁页面用于展示趋势与名单（先做美术）。
        </div>
      </div>
    </div>
  </aside>

  <div id="backdrop" class="backdrop" hidden></div>

  <div class="page">
    <!-- Header -->
    <header class="topbar">
      <div class="topbar__left">
        <div class="brand" aria-label="服务器名称">
          <a class="brand__name" href="./index.html">苍白立方</a>
        </div>

        <nav class="topnav" aria-label="顶部导航">
          <a class="toplink" href="./index.html">主页</a>
          <a class="toplink" href="#" title="占位">服务器介绍</a>
          <a class="toplink" href="#" title="占位">插件管理</a>
          <a class="toplink toplink--active" href="./bans.html" aria-current="page">封禁信息</a>

          <div class="fold" data-fold="misc" aria-expanded="false">
            <button class="fold__btn" type="button" aria-expanded="false">
              <span class="triangle" aria-hidden="true"></span>
              杂项
            </button>
            <div class="fold__panel" role="region" aria-label="杂项 子菜单">
              <a class="fold__item" href="#" title="占位">关于我们</a>
              <a class="fold__item" href="#" title="占位">行为规范</a>
            </div>
          </div>
        </nav>
      </div>

      <div class="topbar__right">
        <button id="settingsBtn" class="btn btn--ghost" type="button" aria-haspopup="dialog" aria-controls="settingsDrawer">
          设置
        </button>
      </div>
    </header>

    <main class="main">
      <!-- Chart -->
      <section class="banChart">
        <div class="card">
          <div class="banChart__head">
            <div>
              <div class="card__title">封禁数量趋势</div>
              <div class="muted banChart__sub">X 轴：封禁时间（月/日）　Y 轴：封禁数量</div>
            </div>
          </div>

          <div class="banChart__canvasWrap">
            <canvas id="banChartCanvas" class="banChart__canvas" aria-label="封禁趋势曲线图"></canvas>
          </div>

          <div class="banChart__legend">
            <div class="legendItem"><span class="legendDot"></span>每日封禁数量（曲线）</div>
            <div class="legendItem muted">占位：后续可切换为“周/日/筛选”</div>
          </div>
        </div>
      </section>

      <!-- List -->
      <section class="banList">
        <div class="content__header" style="margin-top: 14px;">
          <h2 class="content__title">封禁列表</h2>
          <div class="content__crumbs">苍白立方 / 封禁信息</div>
        </div>

        <div class="banGrid" id="banGrid"></div>
      </section>

      <footer class="footer">
        <a class="footer__link" href="#" title="占位">用户协议</a>
        <span class="footer__sep">·</span>
        <a class="footer__link" href="#" title="占位">隐私政策</a>
      </footer>
    </main>
  </div>

  <script src="./bans.js"></script>
</body>
</html>
